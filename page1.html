<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
html {
  -webkit-text-size-adjust: 100%;
  font-size: 1rem;
}

body {
  font-size: 1rem;
  line-height: 1.5;
  padding: 15px;
}

.flex-text-safe {
  display: flex;
  flex-wrap: wrap;     /* REQUIRED */
  white-space: normal; /* REQUIRED */
}

.box {
  border: 1px solid #ddd;
  padding: 10px;
  margin-top: 15px;
}
.visually-hidden {
    clip: rect(1px, 1px, 1px, 1px);
    clip-path: inset(50%);
    height: 1px;
    width: 1px;
    margin: -1px;
    overflow: hidden;
    padding: 0;
    position: absolute;
    white-space: nowrap; /* Prevents text from wrapping and removing spaces */
    border: 0; /* Ensures no visible border remains */
}
</style>
</head>

<body>

<p>This paragraph WILL scale when you increase Accessibility → Display & Text Size → Larger Text on iOS.</p>

<div class="flex-text-safe box">
  This text is inside a flexbox, but it will still resize because wrapping is allowed.
</div>
<div>
  <label for="grossIncome">Input 1</label>
  <div>
        <!-- Inline SVG Icon Example (a circle) -->
    <svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" alt="">
      <title id="title">A yellow circle icon</title>
      <desc id="desc">A simple yellow circle with a green border.</desc>
      <circle cx="50" cy="50" r="40" stroke="green" stroke-width="4" fill="yellow" />
    </svg>
    <div>
        <input aria-invalid="false" aria-label="Input 1" name="gross" id="grossIncome" placeholder="0.00" />
      <span class="visually-hidden">GBP</span>
    </div>  
  </div>
</div>
  <div>
     <label for="country">Country</label>
    <div>
      <input readonly="true" id="country" name="country"/>
    </div>
  </div>
</body>
</html>
