<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
html {
  -webkit-text-size-adjust: 100%;
  font-size: 1rem;
}

body {
  font-size: 1rem;
  line-height: 1.5;
  padding: 15px;
}

.flex-text-safe {
  display: flex;
  flex-wrap: wrap;     /* REQUIRED */
  white-space: normal; /* REQUIRED */
}

.box {
  border: 1px solid #ddd;
  padding: 10px;
  margin-top: 15px;
}
.visually-hidden {
    clip: rect(0 0 0 0);
    height: 1px;
    width: 1px;
    margin: -1px;
    overflow: hidden;
    padding: 0;
    position: absolute;
    white-space: nowrap; /* Prevents text from wrapping and removing spaces */
    border: 0; /* Ensures no visible border remains */
}
</style>
  <script>
const input = document.getElementById('gross-income');
const baseLabel = "What's your annual income before tax?";

function updateAriaLabel() {
  if (input.value) {
    input.setAttribute('aria-label', `${baseLabel} ${input.value}`);
  } else {
    input.setAttribute('aria-label', baseLabel);
  }
}

//input.addEventListener('input', updateAriaLabel);   // while typing
input.addEventListener('focus', updateAriaLabel);   // when returning to field
  </script>
</head>

<body>

<p>This paragraph WILL scale when you increase Accessibility → Display & Text Size → Larger Text on iOS.</p>

<div class="flex-text-safe box">
  This text is inside a flexbox, but it will still resize because wrapping is allowed.
</div>
<div>
  <label id="income-label" for="income-input" aria-hidden="true">Input 1</label>
  <div>
        <!-- Inline SVG Icon Example (a circle) -->
    <svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" alt="" aria-hidden="true">
      <title id="title">A yellow circle icon</title>
      <desc id="desc">A simple yellow circle with a green border.</desc>
      <circle cx="50" cy="50" r="40" stroke="green" stroke-width="4" fill="yellow" />
    </svg>
    <div>
        <input aria-invalid="false" name="gross" placeholder="0.00" id="income-input" aria-labelledby="income-label" aria-describedby="currency-text"/>
              <span id="currency-text" class="visually-hidden">GBP</span>

    </div>  
  </div>
</div>
  <div>
     <label for="country">Country</label>
    <div>
      <input readonly="true" id="country" name="country"/>
    </div>
  </div>
  <div>
<div>
  <!-- Visible label, hidden from a11y tree -->
  <label for="gross-income" aria-hidden="true">
    What's your annual income before tax?
  </label>

  <input
    id="gross-income"
    type="text"
    aria-labelledby="gross-income-label"
  />

  <!-- Hidden from view, visible to a11y tree -->
  <span id="gross-income-label" class="visually-hidden">
    What's your annual income before tax? GBP
  </span>
</div>
  </div>
</body>
</html>
