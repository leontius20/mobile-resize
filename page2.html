<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Accessible Text Resize Control</title>

<style>
  :root {
    --base-font-size: 100%; /* will be changed by JS */
  }

  html {
    font-size: var(--base-font-size);
    -webkit-text-size-adjust: 100%;
    text-size-adjust: 100%;
  }

  body {
    font-size: 1rem; /* scales with html */
    line-height: 1.6;
    margin: 0;
    padding: 1rem;
  }

  /* Make sure layout allows text growth */
  .content {
    display: block;
    max-width: 65ch;
  }

  /* Example components */
  .toolbar {
    display: flex;
    gap: 0.5rem;
    align-items: center;
    flex-wrap: wrap;        /* allow wrapping on iOS */
    margin-bottom: 1rem;
  }

  .btn {
    font: inherit;
    padding: 0.5rem 0.75rem;
    min-height: 44px;       /* touch target */
    cursor: pointer;
  }

  h1 { font-size: 1.8rem; line-height: 1.2; }
  h2 { font-size: 1.4rem; line-height: 1.3; }
  p, li, td, th { font-size: 1rem; }

  table {
    width: 100%;
    border-collapse: collapse;
    display: block;         /* horizontal scroll when needed */
    overflow-x: auto;
  }
  th, td {
    border: 1px solid #444;
    padding: 0.5rem;
    overflow-wrap: anywhere;
  }
</style>
</head>
<body>

<div class="toolbar" aria-label="Text size controls">
  <button class="btn" id="decrease" aria-label="Decrease text size">A−</button>
  <button class="btn" id="increase" aria-label="Increase text size">A+</button>
  <span id="status" aria-live="polite"></span>
</div>

<div class="content">
  <h1>Sample Content</h1>
  <p>This paragraph will resize when you press A+/A− or use browser zoom. It uses relative units so it scales cleanly on iOS and Android.</p>

  <h2>List</h2>
  <ul>
    <li>First item</li>
    <li>Second item</li>
    <li>Third item</li>
  </ul>

  <h2>Table</h2>
  <table>
    <tr><th>Sl. No</th><th>Name</th><th>Age</th></tr>
    <tr><td>1</td><td>Alice</td><td>25</td></tr>
    <tr><td>2</td><td>Bob</td><td>30</td></tr>
  </table>
</div>

<script>
  (function () {
    const MIN = 80;   // 80% of base
    const MAX = 160;  // 160% of base
    const STEP = 10;

    const key = 'user-font-size-percent';
    const root = document.documentElement;
    const status = document.getElementById('status');

    function getCurrent() {
      const v = parseInt(localStorage.getItem(key), 10);
      return Number.isFinite(v) ? v : 100;
    }

    function apply(v) {
      const clamped = Math.max(MIN, Math.min(MAX, v));
      root.style.setProperty('--base-font-size', clamped + '%');
      localStorage.setItem(key, clamped);
      if (status) status.textContent = `Text size: ${clamped}%`;
    }

    document.getElementById('increase')?.addEventListener('click', () => {
      apply(getCurrent() + STEP);
    });
    document.getElementById('decrease')?.addEventListener('click', () => {
      apply(getCurrent() - STEP);
    });

    apply(getCurrent());
  })();
</script>

</body>
</html>
