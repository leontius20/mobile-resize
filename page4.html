<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>OL LI</title>
  <style>
 ol {
  counter-reset: listCounter;
   list-style: none;
   width" 100px;
}
ol li {
  counter-increment: listCounter;
  margin-bottom: 30px;
  display: grid;
    grid-template-columns: 0.1fr 1fr;
}
ol li:before {
  content: counter(listCounter);
  padding-right:10px;
}
  </style>
</head>
<body>
  <div>Start OL</div>
<ol>
  <li>apple apple apple apple apple apple apple apple apple</li>
  <li>orange orange orange orange orange orange orange orange</li>
  <li>grape grape grape grape grape grape grape grape grape</li>
</ol>
    <div>END OL</div>
</body>
</html>
