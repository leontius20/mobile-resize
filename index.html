<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Accessible & Resizable Sample</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">
<style>
html {
  -webkit-text-size-adjust: 100%;
  text-size-adjust: 100%;
  font-size: clamp(16px, 1.2vw + 1rem, 20px);
}

body {
  font-size: 1rem;
  line-height: 1.6;
  margin: 0;
}

p, li, td, th {
  font-size: 1rem;
}
</style>
</head>
<body>
  <h1>Sample HTML Elements</h1>
  <p>This paragraph scales with user settings on iOS and Android.</p>

  <h2>Sample Unordered List</h2>
  <ul>
    <li>First item</li>
    <li>Second item</li>
    <li>Third item</li>
  </ul>

  <h2>Sample Table</h2>
  <table>
    <tr><th>Sl. No</th><th>Name</th><th>Age</th></tr>
    <tr><td>1</td><td>Alice</td><td>25</td></tr>
    <tr><td>2</td><td>Bob</td><td>30</td></tr>
  </table>
</body>
</html>
