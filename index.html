<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Accessible & Resizable Sample</title>

  <!-- Viewport: allow zoom + safe areas -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="light dark" />

  <style>
    html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; font-size: clamp(16px, 1.2vw + 1rem, 20px); }
    body {
      font-size: 1rem; line-height: 1.6; margin: 0;
      padding-left: max(16px, env(safe-area-inset-left));
      padding-right: max(16px, env(safe-area-inset-right));
      padding-top: max(16px, env(safe-area-inset-top));
      padding-bottom: max(16px, env(safe-area-inset-bottom));
    }
    h1 { font-size: clamp(1.75rem, 2.5vw + 1rem, 2.5rem); line-height: 1.2; }
    h2 { font-size: clamp(1.5rem, 2vw + 1rem, 2rem); line-height: 1.3; }
    p, li, td, th { font-size: 1rem; }
    ul { padding-left: 1.25rem; }
    table { width: 100%; border-collapse: collapse; display: block; overflow-x: auto; }
    th, td { border: 1px solid #444; padding: 0.5rem; overflow-wrap: anywhere; }
    button, a, input, select, textarea { font-size: 1rem; min-height: 44px; padding: 0.6rem 0.9rem; }
    @media (prefers-reduced-motion: reduce) {
      * { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; scroll-behavior: auto !important; }
    }
  </style>
</head>
<body>
  <h1>Sample HTML Elements</h1>
  <p>This paragraph scales with user settings on iOS and Android.</p>

  <h2>Sample Unordered List</h2>
  <ul>
    <li>First item</li>
    <li>Second item</li>
    <li>Third item</li>
  </ul>

  <h2>Sample Table</h2>
  <table>
    <tr><th>Sl. No</th><th>Name</th><th>Age</th></tr>
    <tr><td>1</td><td>Alice</td><td>25</td></tr>
    <tr><td>2</td><td>Bob</td><td>30</td></tr>
  </table>
</body>
</html>
