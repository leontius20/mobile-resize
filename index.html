<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sample HTML Page</title>
    <style>
        table {
            border-collapse: collapse;
            width: 50%;
        }
        table, th, td {
            border: 1px solid #333;
            padding: 8px;
        }
        th {
            background-color: #f0f0f0;
        }
    </style>
</head>
<body>

    <h1>Sample HTML Elements</h1>

    <!-- Paragraph -->
    <p>This is a sample paragraph demonstrating basic HTML structure. You can use HTML to display text, lists, tables, and more.</p>

    <!-- Unordered List -->
    <h2>Sample Unordered List</h2>
    <ul>
        <li>First item</li>
        <li>Second item</li>
        <li>Third item</li>
    </ul>

    <!-- Table -->
    <h2>Sample Table</h2>
    <table>
        <tr>
            <th>Sl. No</th>
            <th>Name</th>
            <th>Age</th>
        </tr>
        <tr>
            <td>1</td>
            <td>Alice</td>
            <td>25</td>
        </tr>
        <tr>
            <td>2</td>
            <td>Bob</td>
            <td>30</td>
        </tr>
    </table>

</body>
</html>
